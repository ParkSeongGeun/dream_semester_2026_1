# ============================================
# ComfortableMove - Docker Compose (Production)
# ============================================
# RDS PostgreSQL 사용, 로컬 Redis만 기동
# 사용법: docker compose -f docker-compose.prod.yml up -d
# ============================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comfortablemove_backend
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    networks:
      - comfortablemove_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7
    container_name: comfortablemove_redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - comfortablemove_network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  comfortablemove_network:
    driver: bridge
    name: comfortablemove_network

volumes:
  redis_data:
    name: comfortablemove_redis_data
