name: CI - Lint, Test & Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'

env:
  PYTHON_VERSION: '3.12'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: comfortablemove-backend

jobs:
  # ──────────────────────────────────────────
  # Job 1: Lint
  # ──────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 app/ --count --statistics

  # ──────────────────────────────────────────
  # Job 2: Test
  # ──────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: comfortablemove_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d comfortablemove_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/comfortablemove_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: development
          SEOUL_BUS_API_KEY: test_key_for_ci
          SECRET_KEY: ci-test-secret-key
        run: |
          python -m pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -m "not slow"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────
  # Job 3: Docker Build & ECR Push
  # ──────────────────────────────────────────
  build-and-push:
    name: Docker Build & ECR Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.ECR_REPOSITORY }}:${{ github.sha }} ./backend

      - name: Verify image
        run: docker images ${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      # ECR Secrets 미등록 시 push 건너뜀 (빌드 검증은 항상 수행)
      - name: Check ECR secrets
        id: check-ecr
        env:
          KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          if [ -z "$KEY" ] || [ -z "$SECRET" ] || [ -z "$REGISTRY" ]; then
            echo "::warning::ECR secrets not configured — skipping ECR push."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: |
          steps.check-ecr.outputs.skip == 'false' &&
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: |
          steps.check-ecr.outputs.skip == 'false' &&
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag & Push to ECR
        if: |
          steps.check-ecr.outputs.skip == 'false' &&
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          IMAGE=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}
          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} $IMAGE:${{ github.sha }}
          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          echo "Pushed: $IMAGE:${{ github.sha }}"
          echo "Pushed: $IMAGE:latest"
