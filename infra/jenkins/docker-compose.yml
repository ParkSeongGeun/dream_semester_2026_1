# ============================================
# 맘편한 이동 - Jenkins 로컬 실행 (Docker Compose)
#   docker compose up -d --build
#   초기 비밀번호 입력 없이 .env 의 관리자 계정으로 바로 로그인
# ============================================
services:
  jenkins:
    build: .
    image: comfortablemove-jenkins:latest
    container_name: comfortablemove-jenkins
    # Docker Desktop(macOS)의 docker.sock 접근을 위해 root 로 실행 (로컬 학습 환경)
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"    # Jenkins 웹 UI
      - "50000:50000"  # 에이전트 통신 포트
    environment:
      JENKINS_ADMIN_ID: "${JENKINS_ADMIN_ID:-admin}"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD:-admin123!}"
      JENKINS_URL: "${JENKINS_URL:-http://localhost:8080/}"
      SLACK_TOKEN: "${SLACK_TOKEN:-}"
      SLACK_CHANNEL: "${SLACK_CHANNEL:-}"
      SLACK_TEAM: "${SLACK_TEAM:-}"
      ECR_REGISTRY: "${ECR_REGISTRY:-}"
      AWS_REGION: "${AWS_REGION:-ap-northeast-2}"
    volumes:
      - jenkins_home:/var/jenkins_home
      # host Docker 데몬 공유 (Docker outside of Docker) → 파이프라인에서 docker build 가능
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
