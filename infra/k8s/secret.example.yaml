# 민감 환경변수 템플릿 — 실제 값으로 채운 뒤 secret.yaml 로 복사하여 적용.
# secret.yaml 은 .gitignore 로 커밋 제외 (infra/k8s/.gitignore 참고).
#
# 외부 DB/Redis 사용 시:
#   - 호스트의 docker-compose 를 가리키려면 host.minikube.internal 사용
#     예: postgresql+asyncpg://user:pass@host.minikube.internal:5432/comfortablemove
#   - 클라우드 RDS/ElastiCache 가리키려면 해당 엔드포인트 사용
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: comfortablemove
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: comfortablemove
type: Opaque
stringData:
  # SQLAlchemy async URL (asyncpg driver)
  DATABASE_URL: "postgresql+asyncpg://user:CHANGE_ME@host.minikube.internal:5432/comfortablemove"
  # Redis 0번 DB
  REDIS_URL: "redis://host.minikube.internal:6379/0"
  # 서울시 공공데이터 API 키
  SEOUL_BUS_API_KEY: "CHANGE_ME"
  # FastAPI/JWT 등 서명용 비밀키
  SECRET_KEY: "CHANGE_ME_TO_RANDOM_32_BYTES"
