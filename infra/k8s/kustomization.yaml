# 단일 진입점: `kubectl apply -k infra/k8s/` 한 번으로 전체 배포.
# secret.yaml 은 .gitignore 로 제외됨 — 각자 secret.example.yaml 을 복사해 만든 뒤 적용.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: comfortablemove

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: comfortablemove
