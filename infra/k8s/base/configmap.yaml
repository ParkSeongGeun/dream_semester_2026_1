# EKS кіөнҶө м„Өм • вҖ” нҷҳкІҪлі„ к°’мқҖ overlayмқҳ configMapGenerator patchлЎң лҚ®м–ҙм”Җ
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  ENVIRONMENT: "production"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"
  LOG_LEVEL: "INFO"

  DB_ECHO: "false"
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"

  REDIS_TTL_BUS_ARRIVAL: "60"
  REDIS_TTL_STATISTICS: "300"

  SEOUL_BUS_API_BASE_URL: "http://ws.bus.go.kr/api/rest"
  SEOUL_BUS_API_TIMEOUT: "10"
  SEOUL_BUS_API_MAX_RETRIES: "3"

  CORS_ORIGINS: '["https://api.comfortablemove.com"]'
  CORS_ALLOW_CREDENTIALS: "true"
