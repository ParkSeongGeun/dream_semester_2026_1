# 비민감 환경변수 — backend/app/core/config.py 의 Settings 매핑.
# 민감 값(DATABASE_URL/REDIS_URL/API_KEY/SECRET_KEY)은 secret.yaml 에 분리.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: comfortablemove
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: comfortablemove
data:
  # 학습용 minikube 환경 — DB schema 자동 생성을 위해 development 로 둔다.
  # 실제 운영 환경에서는 production 으로 두고 Alembic 마이그레이션을 사용한다.
  ENVIRONMENT: "development"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"
  LOG_LEVEL: "INFO"

  # Database tuning (URL 자체는 Secret)
  DB_ECHO: "false"
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"

  # Redis TTL
  REDIS_TTL_BUS_ARRIVAL: "60"
  REDIS_TTL_STATISTICS: "300"

  # Seoul Bus API (KEY 만 Secret)
  SEOUL_BUS_API_BASE_URL: "http://ws.bus.go.kr/api/rest"
  SEOUL_BUS_API_TIMEOUT: "10"
  SEOUL_BUS_API_MAX_RETRIES: "3"

  # CORS
  CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
  CORS_ALLOW_CREDENTIALS: "true"
