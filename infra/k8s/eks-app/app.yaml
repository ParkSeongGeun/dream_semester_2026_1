# =============================================================
# ComfortableMove on EKS — ArgoCD GitOps 배포 대상 (15주차)
# self-contained: postgres + redis + backend(ECR 이미지)
# 주의: backend-secret 은 보안상 Git 에 두지 않고 kubectl 로 별도 생성한다.
# =============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: comfortablemove
---
# ── PostgreSQL (데모용 emptyDir, 비영속) ─────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: comfortablemove
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: cmuser }
            - { name: POSTGRES_PASSWORD, value: cmpass }
            - { name: POSTGRES_DB, value: comfortablemove }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "cmuser"] }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: comfortablemove
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
# ── Redis ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: comfortablemove
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: comfortablemove
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
# ── Backend (ECR 이미지, entrypoint 가 alembic upgrade 후 gunicorn) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: comfortablemove
  labels: { app: backend }
spec:
  replicas: 3
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: 299149745641.dkr.ecr.ap-northeast-2.amazonaws.com/comfortablemove-backend:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: backend-secret }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: comfortablemove
spec:
  type: LoadBalancer
  selector: { app: backend }
  ports: [{ port: 80, targetPort: 8000 }]
